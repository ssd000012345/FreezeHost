name: FreezeHost 续期

on:
  schedule:
    - cron: '30 2 * * *'     # 每天 UTC 02:30（北京时间 10:30）
  workflow_dispatch:
    inputs:
      token_number:
        description: '选择 Token 编号'
        required: true
        default: '1'
        type: choice
        options:
          - '1'
          - '2'
          - '3'
          - '4'
          - '5'

jobs:
  renew:
    name: 执行续期
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      actions: write

    steps:
      - name: 拉取仓库
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: |
          pip install playwright
          playwright install chromium --with-deps
          sudo apt-get update && sudo apt-get install -y jq bc

      - name: 启用 WARP + 修复 DNS
        run: |
          # WARP + DNS 修复代码保持不变（省略，保留你原来的）

      - name: 设置 Discord Token
        run: |
          echo "DISCORD_TOKEN=${{ secrets.FREEZEHOST_DISCORD_TOKEN_1 }}" >> "$GITHUB_ENV"

      - name: 运行续期脚本
        env:
          FREEZEHOST_DISCORD_TOKEN: ${{ env.DISCORD_TOKEN }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python renew.py 2>&1 | tee renew.log

      - name: 提取剩余天数
        id: extract_days
        run: |
          echo "🔍 提取剩余天数..."
          
          # 从脚本标准输出提取
          MIN_DAYS=$(grep -oP 'MIN_REMAINING_DAYS:\K[\d.]+' renew.log | tail -1 || echo "")
          if [ -z "$MIN_DAYS" ]; then
            MIN_DAYS=$(grep -oP 'REMAINING_DAYS:\K[\d.]+' renew.log | sort -n | head -1 || echo "999")
          fi
          
          echo "最小剩余天数: $MIN_DAYS"
          echo "remaining_days=$MIN_DAYS" >> "$GITHUB_OUTPUT"
          
          if (( $(echo "$MIN_DAYS > 7" | bc -l) )); then
            echo "skip_update=true" >> "$GITHUB_OUTPUT"
            echo "::notice::剩余时间充足，无需续期"
          else
            echo "skip_update=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 清理历史运行记录
        if: always()
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 1
